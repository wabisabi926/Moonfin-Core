name: Auto-update AUR Package

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  update-aur:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release version
        id: upstream
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_TAG: ${{ github.event.release.tag_name }}
          EVENT_PRERELEASE: ${{ github.event.release.prerelease }}
        run: |
          # Use the tag from the release that triggered this run
          if [ "$EVENT_NAME" = "release" ]; then
            if [ "$EVENT_PRERELEASE" = "true" ]; then
              echo "Prerelease, skipping AUR update"
              echo "version=" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            VERSION="$EVENT_TAG"
          else
            VERSION=$(curl -fsS https://api.github.com/repos/Moonfin-Client/Moonfin-Core/releases/latest | jq -r '.tag_name')
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Release version: $VERSION"

      - name: Setup SSH for AUR
        if: steps.upstream.outputs.version != ''
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s' "$AUR_SSH_PRIVATE_KEY" > ~/.ssh/aur_key
          chmod 600 ~/.ssh/aur_key
          cat > ~/.ssh/config << EOF
          Host aur.archlinux.org
            IdentityFile ~/.ssh/aur_key
            User aur
            StrictHostKeyChecking accept-new
          EOF
          chmod 600 ~/.ssh/config

      - name: Clone AUR package
        if: steps.upstream.outputs.version != ''
        run: |
          git clone ssh://aur@aur.archlinux.org/moonfin-bin.git /tmp/aur-package
          cd /tmp/aur-package
          CURRENT_VERSION=$(grep '^pkgver=' PKGBUILD | cut -d'=' -f2)
          CURRENT_SRCINFO_VERSION=$(awk -F' = ' '/^[[:space:]]*pkgver = / {print $2; exit}' .SRCINFO)
          echo "current_version=$CURRENT_VERSION" >> "$GITHUB_ENV"
          echo "current_srcinfo_version=$CURRENT_SRCINFO_VERSION" >> "$GITHUB_ENV"
          echo "AUR current version: $CURRENT_VERSION"
          echo "AUR .SRCINFO version: $CURRENT_SRCINFO_VERSION"

      - name: Check if update needed
        id: check
        if: steps.upstream.outputs.version != ''
        run: |
          VERSION="${{ steps.upstream.outputs.version }}"
          cd /tmp/aur-package
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "Upstream returned null, skipping update"
            echo "needed=false" >> "$GITHUB_OUTPUT"
          elif [ "$VERSION" != "$current_version" ] || [ "$VERSION" != "$current_srcinfo_version" ]; then
            echo "Update needed: PKGBUILD=$current_version, SRCINFO=$current_srcinfo_version, upstream=$VERSION"
            echo "needed=true" >> "$GITHUB_OUTPUT"
          elif ! grep -q 'Moonfin-Client/Moonfin-Core' PKGBUILD || ! grep -q "'mpv'" PKGBUILD; then
            echo "PKGBUILD is stale (repo URL or missing mpv dependency), re-syncing"
            echo "needed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No update needed (version: $current_version)"
            echo "needed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download release and calculate checksum
        if: steps.check.outputs.needed == 'true'
        id: download
        run: |
          VERSION="${{ steps.upstream.outputs.version }}"
          URL="https://github.com/Moonfin-Client/Moonfin-Core/releases/download/${VERSION}/Moonfin_Linux_v${VERSION}.tar.gz"
          for attempt in 1 2 3 4 5 6; do
            if curl -fL --retry 3 -o /tmp/moonfin-linux.tar.gz "$URL"; then
              break
            fi
            if [ "$attempt" = "6" ]; then
              echo "Release asset not available: $URL"
              exit 1
            fi
            echo "Asset not ready yet, retrying in 30s"
            sleep 30
          done
          SHA256=$(sha256sum /tmp/moonfin-linux.tar.gz | cut -d' ' -f1)
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
          echo "Downloaded release, SHA256: $SHA256"

      - name: Update AUR package
        if: steps.check.outputs.needed == 'true'
        run: |
          VERSION="${{ steps.upstream.outputs.version }}"
          SHA256="${{ steps.download.outputs.sha256 }}"
          cd /tmp/aur-package

          git config user.name "${{ vars.GIT_USER_NAME }}"
          git config user.email "${{ vars.GIT_USER_EMAIL }}"

          # Update PKGBUILD
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD
          sed -i "s/^sha256sums=.*/sha256sums=('${SHA256}')/" PKGBUILD
          sed -i "s|^url=.*|url=\"https://github.com/Moonfin-Client/Moonfin-Core\"|" PKGBUILD
          sed -i "s|^source=.*|source=(\"\${pkgname}-\${pkgver}.tar.gz::https://github.com/Moonfin-Client/Moonfin-Core/releases/download/\${pkgver}/Moonfin_Linux_v\${pkgver}.tar.gz\")|" PKGBUILD

          if grep -q '^depends=' PKGBUILD; then
            sed -i "s/^depends=.*/depends=('gtk3' 'glib2' 'libsecret' 'webkit2gtk-4.1' 'mpv' 'harfbuzz-icu')/" PKGBUILD
          else
            sed -i "/^pkgrel=/a depends=('gtk3' 'glib2' 'libsecret' 'webkit2gtk-4.1' 'mpv' 'harfbuzz-icu')" PKGBUILD
          fi

          printf '%s\n' \
            "pkgbase = moonfin-bin" \
            "    pkgdesc = Jellyfin & Emby media client for Linux (binary release)" \
            "    pkgver = ${VERSION}" \
            "    pkgrel = 1" \
            "    url = https://github.com/Moonfin-Client/Moonfin-Core" \
            "    arch = x86_64" \
            "    license = GPL-3.0-or-later" \
            "    depends = gtk3" \
            "    depends = glib2" \
            "    depends = libsecret" \
            "    depends = webkit2gtk-4.1" \
            "    depends = mpv" \
            "    depends = harfbuzz-icu" \
            "    provides = moonfin" \
            "    conflicts = moonfin" \
            "    source = moonfin-bin-${VERSION}.tar.gz::https://github.com/Moonfin-Client/Moonfin-Core/releases/download/${VERSION}/Moonfin_Linux_v${VERSION}.tar.gz" \
            "    sha256sums = ${SHA256}" \
            "" \
            "pkgname = moonfin-bin" > .SRCINFO

          git add PKGBUILD .SRCINFO
          git commit -m "Update to ${VERSION}"
          git push origin master
