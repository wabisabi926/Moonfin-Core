			shellPath = /bin/sh;
			shellScript = "#!/bin/sh\n# Embed App.framework (AOT Dart snapshots) into the app bundle.\n# Present only for release/profile (AOT) builds; debug/JIT has no App.framework.\n# Runs for build, run, AND archive, so TestFlight/App Store builds get it too.\nAPP_FRAMEWORK_SRC=\"${PROJECT_DIR}/Flutter/App.framework\"\nDEST_FRAMEWORKS=\"${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Frameworks\"\nif [ -d \"${APP_FRAMEWORK_SRC}\" ]; then\n  echo \"Embedding App.framework...\"\n  mkdir -p \"${DEST_FRAMEWORKS}\"\n  rsync -av --delete \"${APP_FRAMEWORK_SRC}\" \"${DEST_FRAMEWORKS}/\"\n  # The flutter-tvos tool stamps the iOS deployment floor (e.g. 13.0) into\n  # App.framework/Info.plist, but the binary is linked at the tvOS target.\n  # App Store validation rejects the mismatch (ITMS-90208), so rewrite the\n  # plist to the binary minos so the two always agree.\n  APP_PLIST=\"${DEST_FRAMEWORKS}/App.framework/Info.plist\"\n  APP_BIN=\"${DEST_FRAMEWORKS}/App.framework/App\"\n  MINOS=\"\"\n  if [ -f \"${APP_BIN}\" ]; then\n    MINOS=$(vtool -show-build \"${APP_BIN}\" 2>/dev/null | awk \"/minos/{print \\$2; exit}\")\n  fi\n  if [ -z \"${MINOS}\" ]; then MINOS=\"${TVOS_DEPLOYMENT_TARGET}\"; fi\n  if [ -f \"${APP_PLIST}\" ] && [ -n \"${MINOS}\" ]; then\n    echo \"Setting App.framework MinimumOSVersion to ${MINOS}...\"\n    plutil -replace MinimumOSVersion -string \"${MINOS}\" \"${APP_PLIST}\"\n  fi\n  if [ \"${CODE_SIGNING_REQUIRED}\" != \"NO\" ] && [ -n \"${EXPANDED_CODE_SIGN_IDENTITY}\" ]; then\n    echo \"Codesigning App.framework with ${EXPANDED_CODE_SIGN_IDENTITY}...\"\n    codesign --force --sign \"${EXPANDED_CODE_SIGN_IDENTITY}\" --timestamp=none --generate-entitlement-der \"${DEST_FRAMEWORKS}/App.framework\"\n  fi\nelse\n  echo \"No App.framework to embed (debug/JIT build).\"\nfi\n";
