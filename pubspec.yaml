name: moonfin
description: "Moonfin - Jellyfin & Emby media client for mobile, tablet, and desktop"
publish_to: 'none'
version: 1.4.0+30000117

moonfin:
  android_tv_version: 1.9.2
  android_tv_build_number: 2000004

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Navigation
  go_router: ^17.2.2

  # State Management & DI
  get_it: ^9.2.1
  injectable: ^2.5.0
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Networking
  dio: ^5.9.2
  dio_cookie_manager: ^3.4.0
  cookie_jar: ^4.0.9
  web_socket_channel: ^3.0.3

  # Local Storage
  shared_preferences: ^2.5.5
  flutter_secure_storage: ^10.0.0
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  drift: ^2.28.2
  sqlite3_flutter_libs: ^0.6.0

  # Media Playback
  media_kit: 1.2.6
  media_kit_video: ^2.0.1
  media_kit_libs_video: 1.0.7

  # Image Loading
  cached_network_image: ^3.4.1
  flutter_svg: ^2.2.1

  # Crypto
  crypto: ^3.0.6

  # Connectivity
  connectivity_plus: ^7.1.1

  # Notifications
  flutter_local_notifications: ^21.0.0
  audio_service: ^0.18.18
  audio_session: ^0.2.3

  # Utilities
  device_info_plus: ^11.5.0
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  logger: ^2.7.0
  intl: ^0.20.2
  collection: ^1.19.1
  package_info_plus: ^8.3.1
  uuid: ^4.5.3
  cupertino_icons: ^1.0.9
  window_manager: ^0.5.1

  # Local packages
  server_core:
    path: packages/server_core
  server_jellyfin:
    path: packages/server_jellyfin
  server_emby:
    path: packages/server_emby
  playback_core:
    path: packages/playback_core
  playback_jellyfin:
    path: packages/playback_jellyfin
  playback_emby:
    path: packages/playback_emby
  moonfin_design:
    path: packages/design
  jellyfin_preference:
    path: packages/preference
  moonfin_native_video:
    path: packages/moonfin_native_video
  url_launcher: ^6.3.2
  file_picker: ^11.0.2
  webview_flutter: ^4.13.1
  flutter_inappwebview: ^6.1.5
  webview_win_floating: ^3.0.3
  webview_flutter_android: ^4.12.0
  webview_flutter_wkwebview: ^3.25.1
  youtube_player_iframe: ^6.0.0
  pdfrx: ^2.2.24
  flutter_widget_from_html_core: ^0.16.1
  archive: ^4.0.9
  rar:
    path: packages/rar_fork
  archive_extract:
    path: packages/archive_extract
  screen_brightness_platform_interface: ^2.1.0
  screen_brightness_ios: ^2.1.2
  wakelock_plus: ^1.3.3
  volume_controller: ^3.4.2
  web: ^1.1.1
  custom_tv_text_field:
    path: packages/custom_tv_text_field_fork
  speech_to_text: ^7.3.0
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.5.4
  freezed: ^2.5.8
  json_serializable: ^6.9.5
  injectable_generator: ^2.7.0
  riverpod_generator: ^2.6.4
  drift_dev: ^2.28.0
  mocktail: ^1.0.5
  msix: ^3.16.12

dependency_overrides:
  media_kit_libs_android_video:
    path: packages/media_kit_libs_android_video_full
  synchronized: 3.3.1
  wakelock_plus: 1.3.3
  screen_brightness_android: 2.1.3
  screen_brightness_ios: 2.1.2
  screen_brightness_platform_interface: 2.1.0
  volume_controller: 3.4.2
  universal_platform: 1.1.0
  plugin_platform_interface: 2.1.8
  web: 1.1.1

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/icons/ratings/
    - assets/fonts/

  fonts:
    - family: NeonPulseDisplay
      fonts:
        - asset: assets/fonts/ScienceGothic-Regular.ttf
    - family: NotoSans
      fonts:
        - asset: assets/fonts/NotoSans-Regular.ttf

msix_config:
  display_name: Moonfin
  publisher_display_name: Moonfin
  identity_name: com.moonfin.app
  msix_version: 1.3.3.0
  logo_path: assets/icons/app_icon.png
  capabilities: internetClient, internetClientServer
  languages: en-us
